<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTRPG Vault</title>
    <style>
        :root {
            --ink: #243129;
            --muted: #657269;
            --cream: #f5f0e5;
            --paper: #fffdf7;
            --forest: #233d32;
            --forest-light: #315244;
            --gold: #c69a4b;
            --line: #d9d2c2;
            --sidebar-width: 280px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            min-width: 320px;
            overflow: hidden;
            color: var(--ink);
            background: var(--cream);
            font-family: Georgia, "Times New Roman", serif;
        }

        .site-header {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 76px;
            padding: 0 28px;
            color: #fff;
            background:
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px) 0 0 / 32px 32px,
                var(--forest);
            border-bottom: 4px solid var(--gold);
            box-shadow: 0 2px 12px rgba(27, 39, 31, 0.22);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-mark {
            display: grid;
            width: 42px;
            height: 42px;
            place-items: center;
            color: var(--forest);
            background: var(--gold);
            border: 2px solid #e6c986;
            border-radius: 50%;
            font-family: Arial, sans-serif;
            font-size: 18px;
            font-weight: 800;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.08);
        }

        .brand h1 {
            margin: 0;
            font-size: clamp(22px, 3vw, 30px);
            letter-spacing: 0.04em;
        }

        .brand p {
            margin: 2px 0 0;
            color: #d9e2dc;
            font-family: Arial, sans-serif;
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .header-label {
            color: #d9e2dc;
            font-family: Arial, sans-serif;
            font-size: 13px;
        }

        .app-layout {
            display: grid;
            grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
            height: calc(100vh - 76px);
        }

        .sidebar {
            overflow-y: auto;
            padding: 24px 18px;
            background: #ebe5d8;
            border-right: 1px solid #cfc6b4;
            box-shadow: 3px 0 14px rgba(59, 50, 35, 0.08);
        }

        .sidebar-heading {
            margin: 0 8px 18px;
            color: var(--muted);
            font-family: Arial, sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .tree-group {
            margin-bottom: 7px;
        }

        .tree-group summary {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            color: var(--forest);
            border-radius: 7px;
            cursor: pointer;
            font-family: Arial, sans-serif;
            font-size: 14px;
            font-weight: 800;
            list-style: none;
            user-select: none;
        }

        .tree-group summary::-webkit-details-marker {
            display: none;
        }

        .tree-group summary::before {
            width: 0;
            height: 0;
            content: "";
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 7px solid var(--gold);
            transition: transform 160ms ease;
        }

        .tree-group[open] summary::before {
            transform: rotate(90deg);
        }

        .tree-group summary:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .tree-branch {
            position: relative;
            margin: 1px 0 5px 25px;
            padding: 2px 0 2px 17px;
            border-left: 1px solid #b9ad96;
        }

        .game-link {
            position: relative;
            display: block;
            margin: 3px 0;
            padding: 9px 11px;
            color: #435047;
            border-radius: 6px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            line-height: 1.3;
            text-decoration: none;
            transition: color 140ms ease, background 140ms ease, transform 140ms ease;
        }

        .game-link::before {
            position: absolute;
            top: 50%;
            left: -18px;
            width: 14px;
            content: "";
            border-top: 1px solid #b9ad96;
        }

        .game-link:hover {
            color: var(--forest);
            background: rgba(255, 255, 255, 0.65);
            transform: translateX(2px);
        }

        .game-link.active {
            color: #fff;
            background: var(--forest-light);
            box-shadow: 0 2px 5px rgba(35, 61, 50, 0.2);
        }

        .content {
            position: relative;
            min-width: 0;
            overflow: hidden;
            background: var(--paper);
        }

        .welcome {
            display: grid;
            height: 100%;
            padding: 40px;
            place-items: center;
            text-align: center;
            background:
                radial-gradient(circle at 50% 45%, rgba(198, 154, 75, 0.12), transparent 26%),
                linear-gradient(rgba(255, 253, 247, 0.92), rgba(255, 253, 247, 0.92)),
                repeating-linear-gradient(45deg, #e7dec9 0, #e7dec9 1px, transparent 1px, transparent 12px);
        }

        .welcome-card {
            max-width: 600px;
        }

        .welcome-icon {
            display: grid;
            width: 82px;
            height: 82px;
            margin: 0 auto 24px;
            place-items: center;
            color: var(--gold);
            border: 2px solid var(--gold);
            border-radius: 50%;
            font-size: 40px;
        }

        .welcome h2 {
            margin: 0 0 14px;
            color: var(--forest);
            font-size: clamp(30px, 5vw, 48px);
        }

        .welcome p {
            margin: 0;
            color: var(--muted);
            font-family: Arial, sans-serif;
            font-size: 16px;
            line-height: 1.7;
        }

        .game-frame {
            display: none;
            width: 100%;
            height: 100%;
            background: #fff;
            border: 0;
        }

        .content.has-game .welcome {
            display: none;
        }

        .content.has-game .game-frame {
            display: block;
        }

        @media (max-width: 720px) {
            body {
                overflow: auto;
            }

            .site-header {
                height: 68px;
                padding: 0 16px;
            }

            .brand-mark {
                width: 36px;
                height: 36px;
            }

            .brand p,
            .header-label {
                display: none;
            }

            .app-layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto minmax(500px, calc(100vh - 68px));
                height: auto;
            }

            .sidebar {
                max-height: 42vh;
                padding: 16px;
                border-right: 0;
                border-bottom: 1px solid #cfc6b4;
            }

            .sidebar-heading {
                margin-bottom: 10px;
            }

            .welcome {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="brand">
            <div class="brand-mark" aria-hidden="true">V</div>
            <div>
                <h1>TTRPG Vault</h1>
                <p>A tabletop roleplaying archive</p>
            </div>
        </div>
        <div class="header-label">Game Collections</div>
    </header>

    <div class="app-layout">
        <nav class="sidebar" aria-label="Game collections">
            <h2 class="sidebar-heading">Browse the archive</h2>

            <details class="tree-group" open>
                <summary>D</summary>
                <div class="tree-branch">
                    <a class="game-link" href="Dragonbane.html" data-game="Dragonbane">Dragonbane</a>
                </div>
            </details>

            <details class="tree-group" open>
                <summary>M</summary>
                <div class="tree-branch">
                    <a class="game-link" href="MERP.html" data-game="Middle-earth Role Playing">MERP</a>
                </div>
            </details>

            <details class="tree-group" open>
                <summary>T</summary>
                <div class="tree-branch">
                    <a class="game-link" href="Traveller.html" data-game="Traveller">Traveller</a>
                </div>
            </details>
        </nav>

        <main class="content" id="content">
            <section class="welcome">
                <div class="welcome-card">
                    <div class="welcome-icon" aria-hidden="true">&#9672;</div>
                    <h2>Open the Vault</h2>
                    <p>Select a game from the collection tree on the left. Its books and records will appear here without taking you away from the main archive.</p>
                </div>
            </section>
            <iframe class="game-frame" id="gameFrame" name="gameFrame" title="Selected game collection"></iframe>
        </main>
    </div>

    <script>
        const content = document.getElementById('content');
        const gameFrame = document.getElementById('gameFrame');
        const gameLinks = document.querySelectorAll('.game-link');

        gameLinks.forEach(link => {
            link.addEventListener('click', event => {
                event.preventDefault();

                gameLinks.forEach(item => item.classList.remove('active'));
                link.classList.add('active');

                gameFrame.title = link.dataset.game + ' collection';
                gameFrame.src = link.href;
                content.classList.add('has-game');
            });
        });
    </script>
</body>
</html>
