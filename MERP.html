<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MERP Collection</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 1200px;
    margin: auto;
    padding: 20px;
    background: #f4f4f4;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    border: 1px solid #ddd;
    padding: 10px;
}

th {
    background: #2c3e50;
    color: white;
    cursor: pointer;
}

th:hover {
    background: #34495e;
}

tr:nth-child(even) {
    background: #f9f9f9;
}
</style>

</head>
<body>

<h1>Middle-earth Role Playing (MERP)</h1>

<table id="bookTable">
    <thead>
        <tr>
            <th onclick="sortTable(0)">Code</th>
            <th onclick="sortTable(1)">Name</th>
            <th onclick="sortTable(2)">Year</th>
            <th onclick="sortTable(3)">ISBN</th>
            <th onclick="sortTable(4)">Owned</th>
        </tr>
    </thead>
    <tbody>
    </tbody>
</table>

<script>

let tableData = [];
let sortDirection = {};

fetch('data/MERP.json')
    .then(response => response.json())
    .then(data => {
        tableData = data;
        renderTable();
    });

function renderTable() {

    const tbody = document.querySelector('#bookTable tbody');
    tbody.innerHTML = '';

    tableData.forEach(book => {

        const row = document.createElement('tr');

        row.innerHTML = `
            <td>${book.Code}</td>
            <td>${book.Name}</td>
            <td>${book.Year}</td>
            <td>${book.ISBN}</td>
            <td>${book.Owned ? 'Yes' : 'No'}</td>
        `;

        tbody.appendChild(row);
    });
}

function sortTable(column) {

    const fields = [
        'Code',
        'Name',
        'Year',
        'ISBN',
        'Owned'
    ];

    const field = fields[column];

    sortDirection[field] = !sortDirection[field];

    tableData.sort((a, b) => {

        let valA = a[field];
        let valB = b[field];

        if (typeof valA === 'string') {
            valA = valA.toUpperCase();
            valB = valB.toUpperCase();
        }

        if (valA < valB) {
            return sortDirection[field] ? -1 : 1;
        }

        if (valA > valB) {
            return sortDirection[field] ? 1 : -1;
        }

        return 0;
    });

    renderTable();
}

</script>

</body>
</html>
