<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MERP Collection</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 1200px;
    margin: auto;
    padding: 20px;
    background: #f4f4f4;
}

h1 {
    margin-bottom: 5px;
}

.edition-heading {
    margin-top: 35px;
    color: #2c3e50;
    border-bottom: 2px solid #2c3e50;
    padding-bottom: 6px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    margin-bottom: 30px;
}

th, td {
    border: 1px solid #ddd;
    padding: 10px;
}

th {
    background: #2c3e50;
    color: white;
    cursor: pointer;
    user-select: none;
}

th:hover {
    background: #34495e;
}

tr:nth-child(even) {
    background: #f9f9f9;
}
</style>
</head>

<body>

<h1>Middle-earth Role Playing (MERP)</h1>
<p>Collection organised by edition.</p>

<div id="editionTables"></div>

<script>
let allBooks = [];
let sortState = {};

fetch('data/MERP.json')
    .then(response => response.json())
    .then(data => {
        allBooks = data;
        renderEditionTables();
    })
    .catch(error => {
        console.error('Error loading MERP.json:', error);
        document.getElementById('editionTables').innerHTML =
            '<p>Could not load MERP book data.</p>';
    });

function renderEditionTables() {
    const container = document.getElementById('editionTables');
    container.innerHTML = '';

    const groupedBooks = {};

    allBooks.forEach(book => {
        const edition = book.BookEdition || 'Unknown Edition';

        if (!groupedBooks[edition]) {
            groupedBooks[edition] = [];
        }

        groupedBooks[edition].push(book);
    });

    Object.keys(groupedBooks).forEach(edition => {
        const heading = document.createElement('h2');
        heading.className = 'edition-heading';
        heading.textContent = edition;
        container.appendChild(heading);

        const table = document.createElement('table');
        table.innerHTML = `
            <thead>
                <tr>
                    <th onclick="sortEditionTable('${edition}', 'BookCode')">Code</th>
                    <th onclick="sortEditionTable('${edition}', 'BookName')">Name</th>
                    <th onclick="sortEditionTable('${edition}', 'BookPublished')">Published</th>
                    <th onclick="sortEditionTable('${edition}', 'BookISBN')">ISBN</th>
                    <th>Owned</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        `;

        const tbody = table.querySelector('tbody');

        groupedBooks[edition].forEach(book => {
            const row = document.createElement('tr');

            row.innerHTML = `
                <td>${book.BookCode || ''}</td>
                <td>${book.BookName || ''}</td>
                <td>${book.BookPublished || ''}</td>
                <td>${book.BookISBN || ''}</td>
                <td></td>
            `;

            tbody.appendChild(row);
        });

        container.appendChild(table);
    });
}

function sortEditionTable(edition, field) {
    const key = edition + '-' + field;
    sortState[key] = !sortState[key];

    allBooks.sort((a, b) => {
        const editionA = a.BookEdition || 'Unknown Edition';
        const editionB = b.BookEdition || 'Unknown Edition';

        if (editionA !== edition || editionB !== edition) {
            return 0;
        }

        let valA = a[field] || '';
        let valB = b[field] || '';

        if (typeof valA === 'string') {
            valA = valA.toUpperCase();
            valB = valB.toUpperCase();
        }

        if (valA < valB) {
            return sortState[key] ? -1 : 1;
        }

        if (valA > valB) {
            return sortState[key] ? 1 : -1;
        }

        return 0;
    });

    renderEditionTables();
}
</script>

</body>
</html>
