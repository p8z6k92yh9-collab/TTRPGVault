<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="github-repository" content="TTRPGGamer/TTRPGVault">
<title>TTRPG Collection</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 1200px;
    margin: auto;
    padding: 20px;
    background: #f4f4f4;
}

h1 {
    margin-bottom: 5px;
}

.edition-heading {
    margin-top: 35px;
    color: #2c3e50;
    border-bottom: 2px solid #2c3e50;
    padding-bottom: 6px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    margin-bottom: 30px;
}

th, td {
    border: 1px solid #ddd;
    padding: 10px;
}

th {
    background: #2c3e50;
    color: white;
    cursor: pointer;
    user-select: none;
}

th:hover {
    background: #34495e;
}

.book-link {
    color: #245746;
    font-weight: 700;
    text-decoration-color: #c69a4b;
    text-underline-offset: 3px;
}

.book-link:hover {
    color: #173b2f;
}

tr:nth-child(even) {
    background: #f9f9f9;
}

.error {
    color: #8a3d35;
}
</style>
</head>

<body>

<h1 id="gameTitle">Game Collection</h1>
<p>Collection organised by edition.</p>

<div id="editionTables">
    <p>Loading collection...</p>
</div>

<script>
const parameters = new URLSearchParams(window.location.search);
const gameTitle = parameters.get('title');
const jsonFile = parameters.get('json');
let allBooks = [];
let sortState = {};

if (!gameTitle || !jsonFile || jsonFile.includes('/') || jsonFile.includes('\\')) {
    showError('This game collection link is invalid.');
} else {
    document.title = gameTitle + ' Collection';
    document.getElementById('gameTitle').textContent = gameTitle;

    fetch('data/' + jsonFile, { cache: 'no-store' })
        .then(response => {
            if (!response.ok) {
                throw new Error('Could not load ' + jsonFile);
            }

            return response.json();
        })
        .then(data => {
            if (!Array.isArray(data)) {
                throw new Error('The collection JSON must contain a list of books.');
            }

            return Promise.all(data.map(loadBookEntry));
        })
        .then(books => {
            allBooks = books;
            renderEditionTables();
        })
        .catch(error => {
            console.error('Error loading collection:', error);
            showError('Could not load the book data for this game.');
        });
}

function loadBookEntry(entry) {
    if (!entry.BookMarkdown) {
        return Promise.resolve(entry);
    }

    return loadMarkdown(entry.BookMarkdown)
        .then(markdown => ({
            ...parseFrontmatter(markdown),
            BookMarkdown: entry.BookMarkdown
        }));
}

function loadMarkdown(path) {
    return fetch(buildMarkdownUrl(path), { cache: 'no-store' })
        .then(response => {
            if (response.ok) {
                return response.text();
            }

            return fetch(buildGitHubRawUrl(path), { cache: 'no-store' })
                .then(rawResponse => {
                    if (rawResponse.ok) {
                        return rawResponse.text();
                    }

                    throw new Error('Could not load ' + path);
                });
        });
}

function buildMarkdownUrl(path) {
    return 'data/' + path
        .split('/')
        .map(segment => encodeURIComponent(segment))
        .join('/');
}

function buildGitHubRawUrl(path) {
    const repository = document
        .querySelector('meta[name="github-repository"]')
        .content;
    const encodedPath = path
        .split('/')
        .map(segment => encodeURIComponent(segment))
        .join('/');

    return `https://raw.githubusercontent.com/${repository}/main/data/${encodedPath}`;
}

function parseFrontmatter(markdown) {
    const normalized = markdown.replace(/\r\n/g, '\n');
    const match = normalized.match(/^---\n([\s\S]*?)\n---(?:\n|$)/);
    const properties = {};

    if (!match) {
        return properties;
    }

    let currentKey = '';

    match[1].split('\n').forEach(line => {
        const listItem = line.match(/^\s+-\s+(.+)$/);

        if (listItem && currentKey) {
            if (!Array.isArray(properties[currentKey])) {
                properties[currentKey] = [];
            }

            properties[currentKey].push(stripQuotes(listItem[1].trim()));
            return;
        }

        const separator = line.indexOf(':');

        if (separator === -1) {
            return;
        }

        const key = line.slice(0, separator).trim();
        const value = stripQuotes(line.slice(separator + 1).trim());

        if (key) {
            currentKey = key;
            properties[key] = value;
        }
    });

    return properties;
}

function stripQuotes(value) {
    return value.replace(/^(["'])(.*)\1$/, '$2');
}

function showError(message) {
    document.getElementById('editionTables').innerHTML =
        '<p class="error">' + message + '</p>';
}

function renderEditionTables() {
    const container = document.getElementById('editionTables');
    const groupedBooks = {};
    container.innerHTML = '';

    allBooks.forEach(book => {
        const edition = book.BookEdition || 'Unknown Edition';

        if (!groupedBooks[edition]) {
            groupedBooks[edition] = [];
        }

        groupedBooks[edition].push(book);
    });

    Object.keys(groupedBooks).forEach(edition => {
        const heading = document.createElement('h2');
        heading.className = 'edition-heading';
        heading.textContent = edition;
        container.appendChild(heading);

        const table = document.createElement('table');
        const header = document.createElement('thead');
        const headerRow = document.createElement('tr');
        const columns = [
            ['BookCode', 'Code'],
            ['BookName', 'Name'],
            ['BookPublished', 'Published'],
            ['BookISBN', 'ISBN']
        ];

        columns.forEach(([field, label]) => {
            const cell = document.createElement('th');
            cell.textContent = label;
            cell.addEventListener('click', () => sortEditionTable(edition, field));
            headerRow.appendChild(cell);
        });

        const ownedHeading = document.createElement('th');
        ownedHeading.textContent = 'Owned';
        headerRow.appendChild(ownedHeading);
        header.appendChild(headerRow);
        table.appendChild(header);

        const body = document.createElement('tbody');
        groupedBooks[edition].forEach(book => {
            const row = document.createElement('tr');

            ['BookCode', 'BookName', 'BookPublished', 'BookISBN'].forEach(field => {
                const cell = document.createElement('td');

                if (field === 'BookName' && book.BookMarkdown) {
                    const link = document.createElement('a');
                    const parameters = new URLSearchParams({
                        file: book.BookMarkdown,
                        title: book.BookName || 'Book Details'
                    });

                    link.className = 'book-link';
                    link.href = `book.html?${parameters.toString()}`;
                    link.textContent = book.BookName || 'View book';
                    cell.appendChild(link);
                } else {
                    cell.textContent = book[field] || '';
                }

                row.appendChild(cell);
            });

            row.appendChild(document.createElement('td'));
            body.appendChild(row);
        });

        table.appendChild(body);
        container.appendChild(table);
    });
}

function sortEditionTable(edition, field) {
    const key = edition + '-' + field;
    sortState[key] = !sortState[key];

    allBooks.sort((a, b) => {
        const editionA = a.BookEdition || 'Unknown Edition';
        const editionB = b.BookEdition || 'Unknown Edition';

        if (editionA !== edition || editionB !== edition) {
            return 0;
        }

        const valueA = String(a[field] || '').toUpperCase();
        const valueB = String(b[field] || '').toUpperCase();

        return sortState[key]
            ? valueA.localeCompare(valueB)
            : valueB.localeCompare(valueA);
    });

    renderEditionTables();
}
</script>

</body>
</html>
